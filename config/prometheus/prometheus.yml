global:
  scrape_interval: 5s

# Prometheus pulls system metrics from node-exporter and container metrics from cadvisor)

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

rule_files:
  - /docker-lab/config/prometheus/alerts.yml

