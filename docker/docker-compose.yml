services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/mini-soc/config/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../config/prometheus/prometheus.yml:/docker-lab/config/prometheus/prometheus.yml:ro
      - ../config/prometheus/alerts.yml:/docker-lab/config/prometheus/alerts.yml:ro
      - ../data/prometheus:/prometheus
    restart: unless-stopped
    networks:
      - lab-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - lab-net
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ../data/grafana:/var/lib/grafana
    networks:
      - lab-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    volumes:
      - ../config/loki/loki.yml:/etc/loki/loki.yml:ro
      - ../data/loki:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - lab-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ../config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - lab-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ../config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - lab-net
    restart: unless-stopped


  crm-db:
    image: mariadb:10.5
    container_name: crm-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: espocrm
      MYSQL_USER: espouser
      MYSQL_PASSWORD: espopass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lab-net

  crm:
    image: espocrm/espocrm
    container_name: crm-app
    restart: always
    ports:
      - "3005:80"
    environment:
      ESPOCRM_DATABASE_HOST: crm-db
      ESPOCRM_DATABASE_USER: espouser
      ESPOCRM_DATABASE_PASSWORD: espopass
      ESPOCRM_DATABASE_NAME: espocrm
    depends_on:
      - crm-db
    volumes:
      - crm:/var/www/html
    networks:
      - lab-net

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
      - "8000:8000"    # Porta web di Portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # necessario per controllare Docker
      - portainer_data:/data
    networks:
      - lab-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - lab-net

networks:
  lab-net:
    external: true
volumes:
  db_data:
  portainer_data:
  minio_data:
  crm:
